<!DOCTYPE html>
<html>
<head>
    <title>TechGear Store</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <header>
        <h1>TechGear Store</h1>
        <p>Your one-stop shop for premium tech accessories</p>
    </header>

    <section class="products">
        <div class="card">Wireless Headphones - ₹2000</div>
        <div class="card">Smart Watch - ₹3500</div>
        <div class="card">Mechanical Keyboard - ₹2500</div>
        <div class="card">Gaming Mouse - ₹1200</div>
    </section>
</div>

<div class="chatbox">
    <div class="chat-header">Chat with us</div>
    <div id="chat-log"></div>
    <div class="chat-input-area">
        <input type="text" id="user-input" placeholder="Ask something...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
